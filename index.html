<style>
    :root {
      --text-color: #fff;
      --category-bg: #222;
      --category-active: #4CAF50;
    }

    body {
      margin: 0;
      background: var(--bg-color);
      color: var(--text-color);
      font-family: sans-serif;
      overflow-x: hidden;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 75vh;
      max-height: 500px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    #posterImage {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
    }

    .live-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background-color: red;
  color: white;
  font-size: 14px;
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 3px;
  line-height: 1.2;
  z-index: 10;
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.05); }
  100% { opacity: 1; transform: scale(1); }
}


    

    .controls {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      background: rgba(0, 0, 0, 0.5);
      padding: 6px 12px;
      border-radius: 30px;
      z-index: 2;
    }

    .control-btn, .mute-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
    }

    .quality-select {
      border-radius: 20px;
      padding: 4px 10px;
      background: #1479ff;
      color: white;
      border: none;
      font-size: 12px;
    }

    .category-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px;
      background: var(--category-bg);
      align-items: center;
    }

    .category-bar button {
      background: var(--category-bg);
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
    }

    .category-bar button.active {
      background: var(--category-active);
    }

    .dark-toggle {
      margin-left: auto;
      padding: 8px 14px;
      border-radius: 20px;
      background: #444;
      color: white;
      border: none;
      cursor: pointer;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      padding: 5px;
    }

    .channel {
      background: #111;
      text-align: center;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .channel img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      border-radius: 5px;
    }

    .channel p {
      margin: 5px 0 0;
      color: red;
      font-size: 14px;
    }
  </style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.1/shaka-player.compiled.js"></script>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    /* ওয়াটারমার্ক */
    .watermark {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #ff4444;
      font-size: 20px;
      font-weight: bold;
      opacity: 0.7;
      user-select: none;
      pointer-events: none;
      animation: float 6s infinite alternate ease-in-out;
      text-shadow: 2px 2px 5px #000;
    }
    @keyframes float {
      0%   { transform: translate(0,0); opacity:0.4;}
      50%  { transform: translate(-30px,20px); opacity:0.9;}
      100% { transform: translate(30px,-20px); opacity:0.6;}
    }
    /* কোয়ালিটি মেনু */
    #qualitySelector {
      position: absolute;
      bottom: 10px;   /* এখন একদম নিচে */
      right: 20px;    /* ডান পাশে */
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid #ff4444;
      font-size: 12px;
      z-index: 100;
      cursor: pointer;
      outline: none;
      transition: all 0.3s ease-in-out;
    }
    #qualitySelector:hover {
      background: rgba(255,68,68,0.9);
      border-color: #fff;
    }
    #qualitySelector option {
      background: #000;
      color: #fff;
    }
  </style>


  <div class="watermark">RLive TV</div>
  <video id="video" controls autoplay></video>
  <select id="qualitySelector"></select>

  <script>
    async function initPlayer() {
      const video = document.getElementById('video');
      const player = new shaka.Player(video);
      const qualitySelector = document.getElementById('qualitySelector');

      // DRM কনফিগারেশন
      player.configure({
        drm: {
          clearKeys: {
            '549ab7cd35a64bb6bb479ecead04d69d:': '829799ed534d11fcadeb4b192467e050'
          }
        }
      });

      try {
        await player.load("https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/ch299/default/index.mpd");
        console.log("✅ MPD লোড হয়েছে!");

        // স্ট্রিম ভ্যারিয়ান্টস (কোয়ালিটি)
        const tracks = player.getVariantTracks();

        // ডিফল্ট Auto
        const autoOption = document.createElement('option');
        autoOption.value = 'Select Channels Quality';
        autoOption.textContent = 'Select Channels Quality';
        autoOption.selected = true;
        qualitySelector.appendChild(autoOption);

        tracks.forEach((track) => {
          const option = document.createElement('option');
          option.value = track.id;
          option.textContent = `${track.height || 'Audio'}p (${Math.round(track.bandwidth/1000)} kbps)`;
          qualitySelector.appendChild(option);
        });

        // কোয়ালিটি পরিবর্তন
        qualitySelector.addEventListener('change', (e) => {
          if (e.target.value === 'auto') {
            player.configure({ abr: { enabled: true } });
          } else {
            const trackId = Number(e.target.value);
            const track = tracks.find(t => t.id === trackId);
            if (track) {
              player.configure({ abr: { enabled: false } });
              player.selectVariantTrack(track, true);
            }
          }
        });

      } catch (e) {
        console.error("❌ Error loading MPD", e);
      }
    }

    document.addEventListener('DOMContentLoaded', initPlayer);
  </script>


</script>
