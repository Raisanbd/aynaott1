<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rlive Player (M3U8 Optimized)</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; font-family: sans-serif; }
    .shaka-video-container { position: absolute; inset: 0; width: 100%; height: 100%; }
    video { width: 100%; height: 100%; background: #000; object-fit: contain; }
    .shaka-spinner-container { display: none !important; }
    
    /* আসপেক্ট রেশিও মেনু স্টাইল */
    .ratio-menu { position: absolute; top: 50%; right: 20px; transform: translateY(-50%); background: rgba(0, 0, 0, 0.9); padding: 10px; border-radius: 8px; display: none; flex-direction: column; gap: 8px; z-index: 1000; border: 1px solid rgba(255,255,255,0.2); }
    .ratio-menu.active { display: flex; }
    .ratio-btn { background: rgba(255, 255, 255, 0.1); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .ratio-btn.selected { background: #e74c3c; }
    .custom-icon-btn { background: none; border: none; padding: 0 5px; color: white; cursor: pointer; display: flex; align-items: center; }

    /* ভিডিও লোগো স্টাইল */
    .video-logo-link {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 10;
        transition: transform 0.2s ease;
    }
    .video-logo {
        height: 45px;
        width: auto;
        opacity: 0.85;
    }
    .video-logo-link:hover {
        transform: scale(1.05);
    }
  </style>
</head>
<body>

    <div class="shaka-video-container" id="video-container">
        <video autoplay playsinline id="video" poster="https://i.ibb.co.com/9HhdP6sC/80290.gif"></video>
        
        <a href="https://t.me/rrplex" target="_blank" rel="noopener noreferrer" class="video-logo-link">
            <img class="video-logo" src="https://i.imgur.com/fGlNDuP.png" alt="CineArena">
        </a>

        <div class="ratio-menu" id="ratioMenu">
            <button class="ratio-btn selected" onclick="changeRatio('contain', this)">Original</button>
            <button class="ratio-btn" onclick="changeRatio('fill', this)">Stretch</button>
            <button class="ratio-btn" onclick="changeRatio('cover', this)">Fill (Zoom)</button>
        </div>
    </div>

    <script>
    const video = document.getElementById('video');
    const ratioMenu = document.getElementById('ratioMenu');

    function changeRatio(mode, btn) {
        document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        video.style.objectFit = mode;
        ratioMenu.classList.remove('active'); 
    }

    document.addEventListener('DOMContentLoaded', async () => {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
            console.error('Browser not supported!');
            return;
        }

        const container = document.getElementById('video-container');
        const player = new shaka.Player(video);
        const ui = new shaka.ui.Overlay(player, container, video);
        const controls = ui.getControls();

        ui.configure({
            controlPanelElements: ['play_pause', 'mute', 'volume', 'spacer', 'language' , 'quality', 'fullscreen'],
            volumeBarColors: { base: 'rgba(255, 255, 255, 0.3)', level: 'rgb(255, 255, 255)' },
            seekBarColors: { base: 'rgba(255, 255, 255, 0.3)', buffered: 'rgba(255, 255, 255, 0.5)', played: 'rgb(255, 0, 0)' }
        });  

        // কন্টেইনারে ক্লিক করলে মেনু হাইড করার লজিক
        container.addEventListener('click', (e) => {
            if (e.target.closest('.video-logo-link')) return; 
            
            if (ratioMenu.classList.contains('active')) {
                ratioMenu.classList.remove('active');
            } else {
                controls.showControls();
            }
        });

        // পিকচার-ইন-পিকচার এবং রেশিও বাটন যোগ করা
        const fullscreenBtn = document.querySelector('.shaka-fullscreen-button');
        
        const pipIcon = document.createElement('button');
        pipIcon.innerHTML = '<i class="material-icons-round" style="font-size:24px;">picture_in_picture</i>';
        pipIcon.classList.add('custom-icon-btn');
        fullscreenBtn.parentNode.insertBefore(pipIcon, fullscreenBtn);
        pipIcon.onclick = (e) => { e.stopPropagation(); video.requestPictureInPicture(); };

        const ratioIcon = document.createElement('button');
        ratioIcon.innerHTML = '<i class="material-icons-round" style="font-size:24px;">aspect_ratio</i>';
        ratioIcon.classList.add('custom-icon-btn');
        fullscreenBtn.parentNode.insertBefore(ratioIcon, fullscreenBtn);
        ratioIcon.onclick = (e) => { e.stopPropagation(); ratioMenu.classList.toggle('active'); };

        // দ্রুত এবং স্মুথ প্লেব্যাকের জন্য কনফিগারেশন
        player.configure({
            streaming: {
                bufferingGoal: 30,        // বাফারিং গোল বাড়িয়ে দেওয়া হয়েছে যেন ইন্টারনেট ফ্লাকচুয়েট করলেও না আটকায়
                rebufferingGoal: 2,       // ২ সেকেন্ড বাফার হলেই আবার প্লে শুরু হবে
                bufferBehind: 30,         // পেছনের ৩০ সেকেন্ড বাফারে রাখবে
                jumpLargeGaps: true,      // স্ট্রিমে কোনো গ্যাপ থাকলে তা স্কিপ করবে
            },
            manifest: {
                hls: {
                    ignoreTextStreamFailures: true,
                    ignoreImageStreamFailures: true
                }
            }
        });

        // এখানে আপনার m3u8 লিংকটি দিন
        const m3u8Url = "https://fifa-stream-proxy.mdsabbirhowlader420.workers.dev/https://1nyaler.streamhostingcdn.top/stream/106/index.m3u8";

        try {
            await player.load(m3u8Url);
            video.muted = false;
            video.volume = 1.0;
        } catch (error) { 
            console.error('Load error:', error); 
        }
    });
    </script>
</body>
</html>
